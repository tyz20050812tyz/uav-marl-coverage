# 无人机协同区域覆盖 — 统一配置文件
# 所有超参数默认值集中管理

# --- 环境配置 ---
env:
  name: "simple_spread_v3"
  num_agents: 3          # 智能体数量（=目标点数量）
  local_ratio: 0.5       # 局部奖励与全局奖励的权重比例
  max_cycles: 50         # 每 episode 最大步数
  continuous_actions: true

# --- 网络超参数 ---
network:
  actor_hidden: [64, 64]       # Actor 隐藏层维度
  critic_hidden: [128, 64]     # Critic 隐藏层维度
  actor_lr: 0.001              # Actor 学习率
  critic_lr: 0.001             # Critic 学习率
  gamma: 0.95                  # 折扣因子
  tau: 0.01                    # 软更新系数

# --- 训练超参数 ---
training:
  buffer_size: 1000000         # 经验回放池容量
  batch_size: 1024             # 批次大小
  episodes: 20000              # 训练 episode 总数
  eval_interval: 500           # 评估间隔（episodes）
  eval_episodes: 10            # 每次评估的 episode 数

# --- 探索噪声（Ornstein-Uhlenbeck）---
ou_noise:
  theta: 0.15
  sigma: 0.2
  mu: 0.0

# --- TD3 稳定性增强 ---
td3:
  policy_delay: 2              # Actor 延迟更新步数
  target_noise_std: 0.2        # 目标策略平滑噪声标准差
  target_noise_clip: 0.5       # 目标策略平滑噪声截断值

# --- RS-MADDPG 改进模块 ---
rs_maddpg:
  # 目标分配引导
  assignment:
    lambda_a: 0.5              # 分配奖励权重系数
    hysteresis_epsilon: 0.05   # 迟滞阈值（防目标闪烁）
    lock_steps: 5              # 前 K 步锁定分配

  # 冗余覆盖惩罚
  redundancy:
    coverage_radius_ratio: 0.12  # 覆盖半径占环境边长的比例
    lambda_r_max: 0.3           # 最大冗余惩罚权重

  # 安全距离约束
  safety:
    safe_distance_ratio: 0.1    # 安全距离占环境边长的比例
    lambda_s_max: 0.5           # 最大安全距离惩罚权重

  # 动态权重调度（选做）
  weight_scheduling:
    enabled: false              # 是否启用动态权重
    early_ratio: 0.3            # 早期阶段占比
    middle_ratio: 0.4           # 中期阶段占比
    # 后期 = 1 - early - middle

# --- 实验配置 ---
experiment:
  seeds: [42, 123, 456]        # 随机种子列表
  quick_verify_episodes: 5000  # 快速验证 episode 数

# --- 日志与输出 ---
output:
  log_dir: "outputs/logs"
  model_dir: "outputs/models"
  export_dir: "outputs/exports"
  checkpoint_interval: 1000    # checkpoint 保存间隔
